name: rivr_companion
description: Companion app for Rivr LoRa mesh nodes — chat, monitor and configure.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # BLE connectivity
  flutter_blue_plus: ^1.33.0

  # USB Serial (Android + Linux + Windows via libusb)
  usb_serial: ^0.5.2

  # Permissions (Android, iOS)
  permission_handler: ^11.3.1

  # Persistent settings
  shared_preferences: ^2.3.3

  # Charts / visualisation
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
